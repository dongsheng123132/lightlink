<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LightLink - 光通信</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff88">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== Intro Screen ===== -->
    <div id="intro-screen" class="screen active">
      <div class="intro-content">
        <div class="logo">
          <div class="logo-signal"></div>
          <div class="logo-signal delay1"></div>
          <div class="logo-signal delay2"></div>
        </div>
        <h1>LightLink</h1>
        <p class="subtitle">手机间光通信 / Phone-to-Phone Light Comm</p>
        <p class="desc">用闪光灯/屏幕闪光和摄像头实现两台手机之间的无网络通信。<br>SOS 握手建立连接，还能开启吵架模式互怼!</p>
        <button id="btn-start" class="btn-primary">开始通信</button>
        <div class="features">
          <div class="feature"><span class="icon">&#x1f4f1;</span> 无需网络/蓝牙</div>
          <div class="feature"><span class="icon">&#x1f4a1;</span> 闪光灯/屏幕信号</div>
          <div class="feature"><span class="icon">&#x1f4f7;</span> 摄像头即接收器</div>
        </div>
      </div>
    </div>

    <!-- ===== Main Screen ===== -->
    <div id="main-screen" class="screen">

      <!-- Camera Panel -->
      <div id="camera-panel">
        <video id="camera-video" autoplay playsinline muted></video>
        <canvas id="analysis-canvas"></canvas>
        <div id="brightness-indicator">
          <div id="brightness-fill"></div>
        </div>
        <div id="camera-label">接收区 - 对准对方闪光灯</div>
        <div id="signal-dot"></div>
      </div>

      <!-- Status Bar -->
      <div id="status-bar">
        <span id="conn-status" class="status-disconnected">未连接</span>
        <span id="mode-label">等待中</span>
        <button id="btn-settings" class="btn-icon" title="设置">&#x2699;</button>
      </div>

      <!-- Message Area -->
      <div id="messages">
        <div class="system-msg">将两台手机背对背放置 (闪光灯对摄像头)，点击 SOS 建立连接</div>
      </div>

      <!-- Quick Actions -->
      <div id="quick-actions">
        <button class="quick-btn sos-btn" data-action="sos">SOS</button>
        <button class="quick-btn fight-btn" data-action="fight">吵架模式</button>
        <button class="quick-btn" data-msg="HI">你好</button>
        <button class="quick-btn" data-msg="OK">收到</button>
        <button class="quick-btn" data-msg="SHUT UP">闭嘴</button>
        <button class="quick-btn" data-msg="NO U">你才是</button>
        <button class="quick-btn" data-msg="HAHA">哈哈哈</button>
        <button class="quick-btn" data-msg="WEAK">你太弱</button>
      </div>

      <!-- Text Input -->
      <div id="input-area">
        <input type="text" id="msg-input" placeholder="输入消息 (英文/数字)..." maxlength="30" autocomplete="off">
        <button id="btn-send" class="btn-primary" disabled>发送</button>
      </div>

      <!-- Signal Area (Sender) -->
      <div id="signal-area">
        <div id="signal-display"></div>
        <div id="signal-status">信号区域 - 发送时将闪烁</div>
        <div id="sending-progress">
          <div id="progress-fill"></div>
          <span id="progress-text"></span>
        </div>
      </div>
    </div>

    <!-- ===== Settings Modal ===== -->
    <div id="settings-modal" class="modal" hidden>
      <div class="modal-content">
        <h3>设置</h3>
        <label>
          信号速度
          <select id="speed-select">
            <option value="slow">慢速 (稳定)</option>
            <option value="medium" selected>中速 (推荐)</option>
            <option value="fast">快速 (近距离)</option>
          </select>
        </label>
        <label>
          检测灵敏度
          <input type="range" id="sensitivity-range" min="1" max="10" value="5">
          <span id="sensitivity-value">5</span>
        </label>
        <label>
          摄像头
          <select id="camera-select">
            <option value="environment" selected>后置 (推荐)</option>
            <option value="user">前置</option>
          </select>
        </label>
        <label>
          信号颜色
          <select id="color-select">
            <option value="green" selected>绿色 (推荐)</option>
            <option value="white">白色</option>
            <option value="cyan">青色</option>
          </select>
        </label>
        <label id="torch-label-wrap">
          <span id="torch-label">闪光灯模式</span>
          <input type="checkbox" id="torch-toggle" checked>
        </label>
        <div class="modal-actions">
          <button id="btn-close-settings" class="btn-primary">确定</button>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
